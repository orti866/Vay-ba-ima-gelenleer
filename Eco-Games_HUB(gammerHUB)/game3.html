<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orman Kurtarma</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Arial;
background:#8fd68f;
overflow:hidden;
}

header{
background:#146c2e;
color:white;
text-align:center;
padding:20px;
}

#topBar{
display:flex;
justify-content:space-around;
background:#222;
color:white;
padding:15px;
font-size:22px;
}

#forest{
width:100%;
height:80vh;
background:linear-gradient(#8fd68f,#5da85d);
position:relative;
cursor:crosshair;
overflow:hidden;
}

.tree{
position:absolute;
font-size:40px;
transform:translate(-50%,-50%);
animation:grow .3s;
user-select:none;
}

@keyframes grow{
from{
transform:translate(-50%,-50%) scale(0);
}
to{
transform:translate(-50%,-50%) scale(1);
}
}

#endScreen{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,.8);
color:white;
font-size:50px;
}

button{
padding:15px 35px;
font-size:22px;
cursor:pointer;
border:none;
border-radius:10px;
margin-top:20px;
}

</style>

</head>

<body>

<header>

<h1>🌳 Orman Kurtarma</h1>

<p>Boş alanlara tıklayarak ağaç dik.</p>

</header>

<div id="topBar">

<div>
🌳 Ağaç:
<span id="treeCount">0</span>/100
</div>

<div>
⏱ Süre:
<span id="time">120</span>
</div>

</div>

<div id="forest"></div>

<div id="endScreen">

<h1 id="result"></h1>

<button onclick="location.reload()">
Tekrar Oyna
</button>

<br>

<a href="index.html">
<button>Ana Menü</button>
</a>

</div>

<script src="game3.js"></script>

</body>
</html>
