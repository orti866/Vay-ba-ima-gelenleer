<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Geri Dönüşüm Avcısı</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(#87CEEB,#b8f7b8);
    overflow:hidden;
}

header{
    background:#1b8f3d;
    color:white;
    text-align:center;
    padding:20px;
}

#info{
    display:flex;
    justify-content:space-around;
    background:#222;
    color:white;
    padding:15px;
    font-size:22px;
}

#gameArea{
    position:relative;
    width:100%;
    height:500px;
    overflow:hidden;
    background:#d7f9ff;
}

.bin{
    position:absolute;
    bottom:20px;
    width:150px;
    height:180px;
    border-radius:15px;
    text-align:center;
    color:white;
    font-size:22px;
    padding-top:20px;
}

#plastic{
    left:8%;
    background:#2196F3;
}

#glass{
    left:39%;
    background:#4CAF50;
}

#paper{
    right:8%;
    background:#FFC107;
    color:black;
}

.trash{
    position:absolute;
    width:60px;
    height:60px;
    font-size:40px;
    text-align:center;
    cursor:pointer;
}

#message{
    text-align:center;
    font-size:28px;
    margin-top:10px;
}

#endScreen{
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,.8);
    color:white;
}

#restart{
    margin-top:20px;
    padding:15px 30px;
    font-size:22px;
    cursor:pointer;
}

</style>

</head>

<body>

<header>

<h1>♻️ Geri Dönüşüm Avcısı</h1>

<p>Çöpleri doğru kutuya sürükle.</p>

</header>

<div id="info">

<div>
⭐ Puan:
<span id="score">0</span>
</div>

<div>
⏱ Süre:
<span id="time">60</span>
</div>

</div>

<div id="gameArea">

<div class="bin" id="plastic">
🟦<br>Plastik
</div>

<div class="bin" id="glass">
🟩<br>Cam
</div>

<div class="bin" id="paper">
🟨<br>Kağıt
</div>

</div>

<div id="message">
Oyunu Başlatmak İçin Bekleyin...
</div>

<div id="endScreen">

<h1 id="result">
Oyun Bitti
</h1>

<button id="restart" onclick="location.reload()">
Tekrar Oyna
</button>

<br><br>

<a href="index.html">
<button id="restart">
Ana Menü
</button>
</a>

</div>

<script src="game2.js"></script>

</body>
</html>
