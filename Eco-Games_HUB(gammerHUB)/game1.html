<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dünya Kıyameti</title>

<link rel="stylesheet" href="style.css">

<style>

body{

margin:0;

font-family:Arial;

background:linear-gradient(#7dd87d,#d5ffd5);

overflow:hidden;

}

header{

background:#156b2d;

color:white;

padding:20px;

text-align:center;

}

#topBar{

display:flex;

justify-content:space-around;

background:#222;

color:white;

padding:15px;

font-size:22px;

}

#healthBar{

width:300px;

height:30px;

background:#444;

border-radius:20px;

overflow:hidden;

}

#health{

height:100%;

width:100%;

background:lime;

transition:1s;

}

#game{

display:flex;

justify-content:center;

gap:20px;

margin-top:40px;

flex-wrap:wrap;

}

button{

width:220px;

height:120px;

font-size:22px;

cursor:pointer;

border:none;

border-radius:15px;

background:white;

transition:.3s;

}

button:hover{

transform:scale(1.05);

}

#message{

margin-top:40px;

text-align:center;

font-size:35px;

font-weight:bold;

}

#end{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

display:none;

justify-content:center;

align-items:center;

flex-direction:column;

background:rgba(0,0,0,.85);

color:white;

font-size:60px;

}

#restart{

margin-top:30px;

width:250px;

height:70px;

font-size:28px;

}

</style>

</head>

<body>

<header>

<h1>🌍 Dünya Kıyameti</h1>

<p>Dünyayı kurtarmak senin elinde!</p>

</header>

<div id="topBar">

<div>

Sağlık

<div id="healthBar">

<div id="health"></div>

</div>

</div>

<div>

🌡️ Sıcaklık

<span id="temp">1.0</span>°C

</div>

<div>

⭐ Puan

<span id="score">0</span>

</div>

</div>

<div id="game">

<button onclick="tree()">
🌳<br>
Ağaç Dik
</button>

<button onclick="solar()">
☀️<br>
Güneş Paneli
</button>

<button onclick="recycle()">
♻️<br>
Geri Dönüşüm
</button>

<button onclick="filterFactory()">
🏭<br>
Filtre Tak
</button>

<button onclick="burnForest()">
🔥<br>
Ormanı Yak
</button>

<button onclick="plastic()">
🛍️<br>
Plastik Kullan
</button>

<button onclick="coal()">
🪨<br>
Kömür Santrali
</button>

<button onclick="trash()">
🗑️<br>
Çöp At
</button>

</div>

<div id="message">

Dünyayı kurtarmaya başla!

</div>

<div id="end">

<h1 id="result"></h1>

<button id="restart" onclick="location.reload()">

Tekrar Oyna

</button>

</div>

<script src="game1.js"></script>

</body>

</html>
